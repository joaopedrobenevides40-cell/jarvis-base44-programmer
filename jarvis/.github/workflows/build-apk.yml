name: Build J.A.R.V.I.S APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # permite rodar manualmente com 1 clique

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configura JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configura Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}

      - name: Permissão Gradlew
        run: chmod +x android/gradlew

      - name: Build APK Debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          JARVIS_API_KEY: "debug_key"
          JARVIS_BASE_URL: "https://jarvis-backend.fly.dev"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
